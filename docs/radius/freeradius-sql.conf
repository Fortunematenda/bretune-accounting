# /etc/freeradius/3.0/mods-available/sql
# FreeRADIUS SQL module configuration for Bretune ISP
# This connects FreeRADIUS to the same PostgreSQL database as Bretune backend

sql {
    driver = "rlm_sql_postgresql"
    dialect = "postgresql"

    server = "localhost"
    port = 5432
    login = "bretune"
    password = "YOUR_DB_PASSWORD"
    radius_db = "bretune-accounting"

    # Table names (match Prisma schema @@map values)
    acct_table1 = "radacct"
    acct_table2 = "radacct"
    authcheck_table = "radcheck"
    authreply_table = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"
    postauth_table = "radpostauth"
    client_table = "nas"

    # Read NAS clients from DB
    read_clients = yes
    client_table = "nas"

    # Connection pool
    pool {
        start = 5
        min = 3
        max = 32
        spare = 3
        uses = 0
        lifetime = 0
        idle_timeout = 60
    }

    # Read groups
    read_groups = yes

    # Log authentication attempts
    postauth {
        query = "\
            INSERT INTO radpostauth \
                (username, pass, reply, authdate) \
            VALUES ( \
                '%{User-Name}', \
                '%{%{User-Password}:-%{Chap-Password}}', \
                '%{reply:Packet-Type}', \
                NOW())"
    }

    # Accounting queries
    accounting {
        # Start
        type = {
            start {
                query = "\
                    INSERT INTO radacct \
                        (acctsessionid, acctuniqueid, username, \
                         nasipaddress, nasportid, nasporttype, \
                         acctstarttime, acctupdatetime, \
                         acctauthentic, connectinfo_start, \
                         calledstationid, callingstationid, \
                         servicetype, framedprotocol, \
                         framedipaddress) \
                    VALUES \
                        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{User-Name}', \
                         '%{NAS-IP-Address}', '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
                         NOW(), NOW(), \
                         '%{Acct-Authentic}', '%{Connect-Info}', \
                         '%{Called-Station-Id}', '%{Calling-Station-Id}', \
                         '%{Service-Type}', '%{Framed-Protocol}', \
                         '%{Framed-IP-Address}')"
            }

            interim-update {
                query = "\
                    UPDATE radacct \
                    SET \
                        acctupdatetime = NOW(), \
                        acctinterval = '%{Acct-Delay-Time}', \
                        framedipaddress = '%{Framed-IP-Address}', \
                        acctsessiontime = '%{Acct-Session-Time}', \
                        acctinputoctets = '%{Acct-Input-Octets}' + \
                            ('%{Acct-Input-Gigawords}' * 4294967296), \
                        acctoutputoctets = '%{Acct-Output-Octets}' + \
                            ('%{Acct-Output-Gigawords}' * 4294967296) \
                    WHERE acctsessionid = '%{Acct-Session-Id}' \
                    AND username = '%{User-Name}' \
                    AND nasipaddress = '%{NAS-IP-Address}'"
            }

            stop {
                query = "\
                    UPDATE radacct \
                    SET \
                        acctstoptime = NOW(), \
                        acctsessiontime = '%{Acct-Session-Time}', \
                        acctinputoctets = '%{Acct-Input-Octets}' + \
                            ('%{Acct-Input-Gigawords}' * 4294967296), \
                        acctoutputoctets = '%{Acct-Output-Octets}' + \
                            ('%{Acct-Output-Gigawords}' * 4294967296), \
                        acctterminatecause = '%{Acct-Terminate-Cause}', \
                        connectinfo_stop = '%{Connect-Info}' \
                    WHERE acctsessionid = '%{Acct-Session-Id}' \
                    AND username = '%{User-Name}' \
                    AND nasipaddress = '%{NAS-IP-Address}'"
            }
        }
    }
}
