# /etc/freeradius/3.0/sites-available/default
# Main FreeRADIUS virtual server for Bretune ISP

server default {
    listen {
        type = auth
        ipaddr = *
        port = 1812
    }

    listen {
        type = acct
        ipaddr = *
        port = 1813
    }

    authorize {
        # 1. Log the request
        preprocess

        # 2. Check SQL database for user credentials
        sql

        # 3. If not found in SQL, reject
        if (!ok) {
            reject
        }

        # 4. Set auth type based on password type
        pap
        chap
        mschap
    }

    authenticate {
        # PAP - Cleartext password comparison
        Auth-Type PAP {
            pap
        }

        # CHAP
        Auth-Type CHAP {
            chap
        }

        # MS-CHAP (for Windows PPPoE clients)
        Auth-Type MS-CHAP {
            mschap
        }
    }

    # Post-authentication - log result and send reply attributes
    post-auth {
        # Log successful auth
        sql

        # Reply attributes come from radreply + radgroupreply
        # FreeRADIUS automatically merges them
    }

    post-auth Post-Auth-Type REJECT {
        # Log failed auth
        sql
    }

    # Accounting - track sessions
    accounting {
        sql
    }

    # Session management
    session {
        sql
    }
}
